<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Me · ZymixUI</title>
<style>
:root{
  --accent-base:#26D93E;--accent-pressed:#1FB432;--accent-foreground:#FFFFFF;
  --accent-soft:rgba(38,217,62,0.15);--accent-soft-foreground:#0F7A23;--accent-soft-subtle:rgba(38,217,62,0.08);
  --default-base:#EBEBEC;--default-foreground:#000000;--default-white:#FFFFFF;--default-black:#000000;
  --foreground-base:#000000;--foreground-muted:rgba(0,0,0,0.55);--foreground-subtle:rgba(0,0,0,0.40);--foreground-inverse:#FFFFFF;--foreground-faint:rgba(0,0,0,0.15);--foreground-ghost:rgba(0,0,0,0.08);
  --background-base:#FFFFFF;--background-secondary:#FCFCFC;--background-tertiary:#F5F5F5;
  --surface-base:#FFFFFF;--surface-secondary:#F5F5F5;--surface-tertiary:#EBEBEB;
  --border-subtle:#EBEBEC;--separator-base:rgba(0,0,0,0.10);--separator-strong:rgba(0,0,0,0.40);
  --skeleton-base:#EBEBEC;
  --feature-nav-fade-solid:#FCFCFC;--feature-nav-fade-transparent:rgba(252,252,252,0);
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-3xl:24px;--radius-5xl:32px;--radius-round:9999px;
}
/* 深色变量:系统深色(未被岛强制浅色时)或岛强制 data-theme=dark 时生效 */
@media (prefers-color-scheme:dark){:root:not(.lite){
  --accent-soft:rgba(38,217,62,0.12);--accent-soft-foreground:#74D88F;--accent-soft-subtle:rgba(38,217,62,0.06);
  --default-base:#27272A;--default-foreground:#FFFFFF;
  --foreground-base:#FFFFFF;--foreground-muted:rgba(255,255,255,0.55);--foreground-subtle:rgba(255,255,255,0.35);--foreground-inverse:#000000;--foreground-faint:rgba(255,255,255,0.15);--foreground-ghost:rgba(255,255,255,0.08);
  --background-base:#0B0B0D;--background-secondary:#09090B;--background-tertiary:#161619;
  --surface-base:#18181B;--surface-secondary:#232327;--surface-tertiary:#2F2F34;
  --border-subtle:#27272A;--separator-base:rgba(255,255,255,0.10);--separator-strong:rgba(255,255,255,0.40);
  --skeleton-base:#27272A;
  --feature-nav-fade-solid:#09090B;--feature-nav-fade-transparent:rgba(9,9,11,0);
}}
[data-theme="dark"]{
  --accent-soft:rgba(38,217,62,0.12);--accent-soft-foreground:#74D88F;--accent-soft-subtle:rgba(38,217,62,0.06);
  --default-base:#27272A;--default-foreground:#FFFFFF;
  --foreground-base:#FFFFFF;--foreground-muted:rgba(255,255,255,0.55);--foreground-subtle:rgba(255,255,255,0.35);--foreground-inverse:#000000;--foreground-faint:rgba(255,255,255,0.15);--foreground-ghost:rgba(255,255,255,0.08);
  --background-base:#0B0B0D;--background-secondary:#09090B;--background-tertiary:#161619;
  --surface-base:#18181B;--surface-secondary:#232327;--surface-tertiary:#2F2F34;
  --border-subtle:#27272A;--separator-base:rgba(255,255,255,0.10);--separator-strong:rgba(255,255,255,0.40);
  --skeleton-base:#27272A;
  --feature-nav-fade-solid:#09090B;--feature-nav-fade-transparent:rgba(9,9,11,0);
}
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(4px) saturate(1.6);-webkit-backdrop-filter:blur(4px) saturate(1.6);box-shadow:0 8px 40px rgba(0,0,0,0.10),inset 0 1px 1px rgba(255,255,255,0.80),inset 0 -1px 1px rgba(255,255,255,0.30)}
@media (prefers-color-scheme:dark){:root:not(.lite) .glass{background:rgba(24,24,27,0.65);box-shadow:0 8px 40px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.12),inset 0 -1px 1px rgba(255,255,255,0.06)}}
[data-theme="dark"] .glass{background:rgba(24,24,27,0.65);box-shadow:0 8px 40px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.12),inset 0 -1px 1px rgba(255,255,255,0.06)}
/* 灵动岛(演示预览控件:切页面状态 + 深/浅色切换;真实交付移除) */
.island{position:absolute;top:11px;left:0;right:0;z-index:60;display:flex;justify-content:center;pointer-events:none}
.island-appear{pointer-events:auto;display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 14px;border:none;cursor:pointer;font-family:inherit;font-size:12px;line-height:16px;font-weight:600;color:var(--default-white);background:var(--default-black);border-radius:var(--radius-round);box-shadow:0 6px 20px rgba(0,0,0,0.28);-webkit-tap-highlight-color:transparent;-webkit-appearance:none;appearance:none;outline:none}
.island-dot{width:7px;height:7px;border-radius:var(--radius-round);background:var(--accent-base);flex-shrink:0}
.island-ic{display:none;color:var(--default-white)}
.island-ic svg{display:block}
.island-appear[data-mode=""] .ic-sys{display:block}
.island-appear[data-mode="light"] .ic-light{display:block}
.island-appear[data-mode="dark"] .ic-dark{display:block}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"SF Pro","SF Pro Text",system-ui,sans-serif;background:#8E8E93;display:flex;justify-content:center;align-items:flex-start;padding:40px;min-height:100vh;-webkit-font-smoothing:antialiased}
.phone{width:375px;height:812px;border-radius:54px;overflow:hidden;position:relative;background:var(--background-base);color:var(--foreground-base);box-shadow:0 0 0 10px #1c1c1e;display:flex;flex-direction:column}
.statusbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 6px;flex-shrink:0}
.statusbar .time{font-size:14px;font-weight:600;letter-spacing:-0.28px}
.statusbar .icons{display:flex;gap:6px;align-items:center}
.screen{flex:1;overflow-y:auto;display:flex;flex-direction:column;position:relative;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen>*{flex-shrink:0}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:var(--foreground-base);opacity:.9}
.ic{display:block;flex-shrink:0}
/* 文字角色 */
.t-scene-header{font-size:34px;line-height:40px;font-weight:900}
.t-title-sm{font-size:20px;line-height:normal;font-weight:600}
.t-body-md{font-size:15px;line-height:normal;font-weight:400}
.t-body-sm{font-size:14px;line-height:normal;font-weight:400}
.t-body-xs{font-size:12px;line-height:16px;font-weight:400}
.t-label-xs{font-size:12px;line-height:normal;font-weight:600}
.t-number{font-size:18px;line-height:20px;font-weight:900}
.t-scene-list{font-size:14px;line-height:17px;font-weight:600;text-transform:capitalize}
/* 件 */
.header-brand{display:flex;align-items:center;padding:8px 16px;min-height:58px}
.avatar{background:var(--skeleton-base);flex-shrink:0;background-size:cover;background-position:center;position:relative}
.grp{background:var(--surface-secondary);border-radius:var(--radius-lg);overflow:hidden}
.row{display:flex;align-items:center;gap:8px;padding:10px 12px;min-height:44px}
.row .cap{flex:1;min-width:0}
.chev{color:var(--foreground-faint)}
.entry{flex:1;background:var(--surface-secondary);border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px 12px}
.entry .art{font-size:30px;line-height:1;height:34px;display:flex;align-items:center;justify-content:center}
.seg-line{height:0.5px;background:var(--separator-base);margin-left:44px}
/* TabBar 组件 */
.tabbar{position:relative;padding:0 8px 20px}
.tabbar::before{content:'';position:absolute;left:0;right:0;bottom:0;height:104px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:linear-gradient(to top,var(--background-base) 10%,transparent 65%);
  mask-image:linear-gradient(to top,#000 45%,transparent);-webkit-mask-image:linear-gradient(to top,#000 45%,transparent);
  pointer-events:none}
.tabbar.no-edge::before{display:none}
.tabbar .pill{position:relative;display:flex;align-items:stretch;padding:4px;border-radius:var(--radius-round)}
.tab{flex:1;height:54px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-round);color:var(--foreground-base)}
.tab.active{background:var(--accent-soft-subtle);color:var(--accent-base)}
/* 移动端:满屏铺满(必须放在基础 body/.phone 之后才能覆盖) */
@media (max-width:440px){
  body{padding:0;background:var(--background-base)}
  .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none}
}
</style>
